services:

  postgres:
    image: postgres:15
    container_name: jq_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - jq_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jq_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jq_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: jq_api
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jq_network
    volumes:
      - ./services/api:/app
      - /app/node_modules
    command: npm run dev

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    container_name: jq_worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jq_network
    volumes:
      - ./services/worker:/app
      - /app/node_modules
    command: npm run dev

  bullboard:
    image: deadly0/bull-board
    container_name: jq_bullboard
    ports:
      - "3001:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    networks:
      - jq_network

networks:
  jq_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: